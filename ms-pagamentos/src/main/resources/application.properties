spring.application.name=ms-pagamentos

spring.profile.active=test
spring.jpa.open-in-view=false

# Eureka Client: registra no Eureka Server e busca o catŠlogo (registry)

# config do Eureka Client (ms-pedidos)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# EndereÁo do Eureka Server (defaultZone ť camelCase)
# localhost 8761, onde o Eureka Server estŠ recebendo as requisiÁűes
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Porta aleatůria para permitir mķltiplas inst‚ncias (escala local)
server.port=0

# Identificador da inst‚ncia (evita sobrescrever no registry)
eureka.instance.instance-id=${spring.application.name}:${random.int[1,99]}
